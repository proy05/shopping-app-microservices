spring.application.name=api-gateway
server.port=9000
spring.security.oauth2.resource-server.jwt.issuer-uri=http://localhost:8181/realms/spring-microservices-shopping-app-security-realm

# Actuator Endpoints
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Set default config for CB/Resilience4j Properties
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
#Move CB to Open state if 50% of last 10 requests fail or time-out
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
#CB will be in Open state for 5 seconds before moving to Half-Open state. This is called sleep window timer
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
#Number of requests allowed in Half-Open state
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
#Automatically transition from Open to Half-Open state once sleep window timer expires
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
#The circuit breaker won't evaluate anything until at least 5 requests have passed through the sliding window.
#Do not calculate the failure rate or trip the circuit until you have collected data from at least 5 request
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

#Resilience4J Timeout Properties
#timeout duration after which the request is considered failed
resilience4j.timelimiter.configs.default.timeout-duration=3s

#Resilience4J Retry Properties
#Once a request fails, it shall be retried/attempted another 2 times (max-attempts=total attempts=3) with a gap of 2s.
#Only after a request completely exhausts all 3 attempts does it get recorded by the Circuit Breaker's metrics
# as ONE FAILURE in its sliding window.
# In case of timeouts, A single failing request takes 13 seconds total to completely fail (= 3+2+3+2+3)

resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=2s

