version: '4'
services:
  mysql:
    image: mysql:8.3.0
    container_name: order-service-db
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - 3306:3306
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql #create the database upon first time container starts (/var/lib/mysql is checked to be empty)