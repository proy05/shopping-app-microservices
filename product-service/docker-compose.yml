version: '3.8'

services:
  mongodb:
    image: mongo:7.0.5
    container_name: mongodb
    ports:
      - "27017:27017" #local:container
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=product-service  # No spaces!
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
    driver: local